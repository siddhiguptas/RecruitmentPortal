<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Proctoring Test</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
        }

        video {
            border: 2px solid #ccc;
            border-radius: 8px;
            transform: scaleX(-1);
        }

        #status {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .suspicious {
            color: red;
        }

        .good {
            color: green;
        }
    </style>
</head>

<body>
    <h1>AI Proctoring Live Test</h1>

    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <video id="video" width="640" height="480" autoplay></video>

    <div id="status" class="good">Waiting for server...</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');

        // Connect to the FastAPI WebSocket
        const ws = new WebSocket("ws://localhost:8000/ws/proctor");

        ws.onopen = () => {
            statusDiv.innerText = "Connected! Starting camera...";
            startCamera();
        };

        ws.onmessage = (event) => {
            const response = JSON.parse(event.data);

            // Update the UI based on the Python engine's response
            statusDiv.innerText = `Head Pose: ${response.head_pose} | Message: ${response.message}`;
            statusDiv.className = response.suspicious ? "suspicious" : "good";
        };

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                // Send a frame to the server every 500ms (2 FPS)
                setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        // Convert canvas to Base64 JPEG
                        const frameData = canvas.toDataURL('image/jpeg', 0.5);
                        ws.send(frameData);
                    }
                }, 500);
            } catch (err) {
                console.error("Error accessing webcam:", err);
                statusDiv.innerText = "Camera access denied or unavailable.";
                statusDiv.className = "suspicious";
            }
        }
    </script>
</body>

</html>
